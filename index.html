<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>추천인 프로그램 가이드</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #ffffff;
      color: #111111;
      font-family: Arial, sans-serif;
    }

    .page {
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 32px 16px 40px;
      text-align: center;
    }

    .title {
      font-size: 32px;
      font-weight: 700;
      margin: 0 0 20px;
      line-height: 1.3;
    }

    .progress-wrap {
      width: 100%;
      max-width: 500px;
      margin: 0 auto 20px;
    }

    .progress-track {
      width: 100%;
      height: 10px;
      background: #ffffff;
      border: 1px solid #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      width: 7.14%;
      height: 100%;
      background: #F8E57B;
      border-radius: 999px;
      transition: width 0.3s ease;
    }

    .progress-text {
      margin-top: 8px;
      font-size: 14px;
      color: #666666;
    }

    .carousel-area {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 16px;
    }

    .slider-wrapper {
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .slider {
      display: flex;
      transition: transform 0.3s ease;
      touch-action: pan-y;
    }

    .slide {
      min-width: 100%;
      display: block;
      text-decoration: none;
    }

    .slide img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .nav {
      flex: 0 0 auto;
      width: 48px;
      height: 48px;
      border-radius: 999px;
      border: 1px solid #d9d9d9;
      background: #ffffff;
      color: #111111;
      font-size: 28px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .nav:hover {
      background: #f5f5f5;
    }

    .bottom-button {
      display: inline-block;
      margin-top: 24px;
    }

    .bottom-button img {
      display: block;
      width: 100%;
      max-width: 320px;
      height: auto;
      margin: 0 auto;
    }

    @media (max-width: 768px) {
      .page {
        padding: 24px 12px 32px;
      }

      .title {
        font-size: 24px;
        margin-bottom: 16px;
      }

      .progress-wrap {
        margin-bottom: 16px;
      }

      .progress-track {
        height: 8px;
      }

      .progress-text {
        font-size: 13px;
      }

      .carousel-area {
        gap: 8px;
      }

      .nav {
        width: 40px;
        height: 40px;
        font-size: 22px;
      }

      .bottom-button {
        margin-top: 20px;
      }

      .bottom-button img {
        max-width: 260px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <h1 class="title">추천인 프로그램 가이드</h1>

    <div class="progress-wrap">
      <div class="progress-track">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div class="progress-text" id="progressText">1 / 14</div>
    </div>

    <div class="carousel-area">
      <button class="nav prev" aria-label="이전 이미지">&#10094;</button>

      <div class="slider-wrapper">
        <div class="slider" id="slider">
          <div class="slide">
            <img src="card1.png" alt="카드뉴스 1" />
          </div>

          <div class="slide">
            <img src="card2.png" alt="카드뉴스 2" />
          </div>

          <div class="slide">
            <img src="card3.png" alt="카드뉴스 3" />
          </div>

          <div class="slide">
            <img src="card4.png" alt="카드뉴스 4" />
          </div>

          <div class="slide">
            <img src="card5.png" alt="카드뉴스 5" />
          </div>

          <div class="slide">
            <img src="card6.png" alt="카드뉴스 6" />
          </div>

          <div class="slide">
            <img src="card7.png" alt="카드뉴스 7" />
          </div>

          <div class="slide">
            <img src="card8.png" alt="카드뉴스 8" />
          </div>

          <div class="slide">
            <img src="card9.png" alt="카드뉴스 9" />
          </div>

          <div class="slide">
            <img src="card10.png" alt="카드뉴스 10" />
          </div>

          <div class="slide">
            <img src="card11.png" alt="카드뉴스 11" />
          </div>

          <div class="slide">
            <img src="card12.png" alt="카드뉴스 12" />
          </div>

          <div class="slide">
            <img src="card13.png" alt="카드뉴스 13" />
          </div>

          <a class="slide" href="https://3hoursahead.com/ko/studio/referrer" target="_blank" rel="noopener noreferrer">
            <img src="card14.png" alt="카드뉴스 14" />
          </a>
        </div>
      </div>

      <button class="nav next" aria-label="다음 이미지">&#10095;</button>
    </div>

    <a class="bottom-button" href="https://3hoursahead.com/ko/studio/referrer" target="_blank" rel="noopener noreferrer">
      <img src="button.png" alt="추천인 프로그램 바로가기 버튼" />
    </a>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const slides = document.querySelectorAll(".slide");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");
    const progressFill = document.getElementById("progressFill");
    const progressText = document.getElementById("progressText");

    let currentIndex = 0;
    let startX = 0;
    let endX = 0;

    function updateSlider() {
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
      updateProgress();
    }

    function updateProgress() {
      const totalSlides = slides.length;
      const currentSlide = currentIndex + 1;
      const progressPercent = (currentSlide / totalSlides) * 100;

      progressFill.style.width = `${progressPercent}%`;
      progressText.textContent = `${currentSlide} / ${totalSlides}`;
    }

    function goToPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlider();
      }
    }

    function goToNext() {
      if (currentIndex < slides.length - 1) {
        currentIndex++;
        updateSlider();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    slider.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    slider.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      if (diff > 50) {
        goToNext();
      } else if (diff < -50) {
        goToPrev();
      }
    }

    updateProgress();
  </script>
</body>
</html>
