<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Referral Cardnews</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      background: #111;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      font-family: Arial, sans-serif;
    }

    .slider-wrapper {
      position: relative;
      width: 100%;
      max-width: 500px;
      overflow: hidden;
    }

    .slider {
      display: flex;
      transition: transform 0.3s ease;
      touch-action: pan-y;
    }

    .slide {
      min-width: 100%;
      display: block;
      text-decoration: none;
    }

    .slide img {
      width: 100%;
      display: block;
      border-radius: 12px;
    }

    .nav {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(0,0,0,0.5);
      color: white;
      border: none;
      font-size: 28px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      cursor: pointer;
      z-index: 10;
    }

    .prev {
      left: 10px;
    }

    .next {
      right: 10px;
    }

    @media (max-width: 768px) {
      .nav {
        width: 38px;
        height: 38px;
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="slider-wrapper">
    <button class="nav prev" aria-label="이전 이미지">&#10094;</button>

    <div class="slider" id="slider">
      <a class="slide" href="https://example.com/page1" target="_blank">
        <img src="https://picsum.photos/500/625?random=1" alt="카드뉴스 1" />
      </a>

      <a class="slide" href="https://example.com/page2" target="_blank">
        <img src="https://picsum.photos/500/625?random=2" alt="카드뉴스 2" />
      </a>

      <a class="slide" href="https://example.com/page3" target="_blank">
        <img src="https://picsum.photos/500/625?random=3" alt="카드뉴스 3" />
      </a>
    </div>

    <button class="nav next" aria-label="다음 이미지">&#10095;</button>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const slides = document.querySelectorAll(".slide");
    const prevBtn = document.querySelector(".prev");
    const nextBtn = document.querySelector(".next");

    let currentIndex = 0;
    let startX = 0;
    let endX = 0;

    function updateSlider() {
      slider.style.transform = `translateX(-${currentIndex * 100}%)`;
    }

    function goToPrev() {
      if (currentIndex > 0) {
        currentIndex--;
        updateSlider();
      }
    }

    function goToNext() {
      if (currentIndex < slides.length - 1) {
        currentIndex++;
        updateSlider();
      }
    }

    prevBtn.addEventListener("click", goToPrev);
    nextBtn.addEventListener("click", goToNext);

    slider.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
    });

    slider.addEventListener("touchend", (e) => {
      endX = e.changedTouches[0].clientX;
      handleSwipe();
    });

    function handleSwipe() {
      const diff = startX - endX;

      if (diff > 50) {
        goToNext();
      } else if (diff < -50) {
        goToPrev();
      }
    }
  </script>
</body>
</html>
